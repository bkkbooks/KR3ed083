巔為末茶調如膏服正偏頭痛一時蠲川芎五錢甘草炙一兩半柴胡七錢黃芩酒炒黃連酒炒羌活防風各一兩每服三錢風寒濕熱上攻頭腦則痛頭兩傍屬少陽偏頭痛屬少陽相火芩連苦寒以羌防芎柴升之則能去濕熱高巔之上矣人參荊芥散婦寶熟地防風柴枳芎歸比酸棗鱉羚桂術甘血風勞作風虛治血脈空疏乃感風邪寒熱盜汗久漸成勞人參荊芥熟地柴胡枳殼棗仁炒鱉甲童便炙羚羊角白朮各五分防風甘草炙當歸川芎桂心各三分加薑煎荊防柴羚以疏風平木地黃鱉甲以退熱滋陰草棗仁以斂汗補虛除煩進食祛寒之劑十二首附方二理中湯仲景主理中鄉仲景曰理中者理中焦甘草人參術黑薑白朮土炒二兩人參乾薑炮甘草炙各一兩治太陰厥逆自利不渴脈沉無力人參補氣益脾為君白朮健脾燥濕為臣甘草和中補土為佐乾薑溫胃散寒為使嘔利腹痛陰寒盛或加附子總扶陽名附子理中湯真武湯仲景壯腎中陽茯苓朮芍附生薑附子一枚炮白朮二兩炒茯苓白芍炒生薑各三兩少陰腹痛有水氣悸眩瞤惕保安康中有水氣故心悸頭眩汗多亡陽故肉瞤筋惕瞤音純動貌苓術補土利水以療悸眩薑附回陽益火以逐虛寒芍藥斂陰和營以止腹痛真武北方水神腎中火足水乃歸元此方補腎之陽壯火而利水故名四逆湯仲景中薑附草三陰厥逆太陽沉附子一枚生用乾薑一兩炙甘草二兩冷服專治三陰厥逆太陽初證脈沉亦用之或益薑蔥參芍桔通陽復脈力能任音仁面赤格陽於上也加蔥白通陽腹痛加芍藥和陰咽痛加桔梗利咽利止脈不出加人參補氣復脈嘔吐加生薑以散逆氣白通加人尿豬膽汁湯仲景尿音鳥去聲小便也俗讀平聲非乾薑附子兼蔥白附子一枚炮乾薑一兩蔥白四莖此白通湯也蔥白以通陽氣薑附子以散陰寒加人尿五合豬膽汁一合熱因寒用妙義深陰盛格陽厥無脈陰寒內甚格陽於外故厥逆無脈純與熱藥則寒氣格拒不得達入故於熱劑中加尿汁寒藥以為引用使得入陰而回陽也吳茱萸湯仲景人參棗重用生薑溫胃好陽明寒嘔太陽熱嘔忌用少陰下利厥陰頭痛皆能保吳茱萸一升炮人參三兩生薑六兩棗十二枚薑茱參棗補土散寒茱萸辛熱能入厥陰治肝氣上逆而致嘔利腹痛益元湯活人艾附與乾薑麥味知連參草將附子炮艾葉乾薑麥冬五味子知母黃連人參甘草艾葉辛熱能回陽薑棗蔥煎入童便冷服內寒外熱名戴陽症此陰盛格陽之症面赤身熱不煩而躁但飲水不入口為外熱內寒此湯薑附加知連與白通加人尿豬膽汁同意乃熱因寒藥為引用也按內熱曰煩為有根之火外熱曰躁為無根之火故但躁不煩及先躁後煩皆不治回陽救急湯節庵曰即四逆湯用六君桂附乾薑五味群附子炮乾薑肉桂人參各五分白朮茯苓各一錢半夏陳皮各七分甘草三分五味九粒薑煎加麝三釐或豬膽汁三陰寒厥見重勳薑桂附子祛其陰六君溫補助其陽氣五味人參以生其脈加麝香者以通其竅加膽汁者熱因寒用也四神丸故紙吳茱萸肉蔻五味四般須大棗百枚薑八兩破故紙四兩酒浸炒吳茱萸一兩鹽水炒肉豆蔻三兩面里煨五味子三兩炒棗生薑同煎棗爛即去薑搗棗肉為丸臨臥鹽湯下若早服不能敵一夜之陰寒也五更腎瀉火衰扶由腎命火衰不能生脾土故五更將交陽分陽虛不能鍵閉而泄瀉不可專責脾胃也破故紙辛溫能補相火以通君火火盛乃能生土肉豆蔻暖胃固陽吳茱萸燥脾去濕五味子補腎澀精生薑溫中大棗補土亦以防水也厚朴溫中湯陳草苓乾薑草蔻木香停煎服加薑治腹痛虛寒脹滿用皆靈厚朴陳皮各一錢甘草茯苓草豆蔻木香各五分乾薑三分加薑煎乾薑草蔻辛熱以散其寒陳皮廣木香辛溫以調其氣厚朴辛溫以散滿茯苓甘淡以利濕甘草甘平以和中寒散氣行痛脹自已矣寒疝痛用導氣湯川楝茴香與木香吳茱煎以長流水散寒通氣利小腸疝亦名小腸氣川楝四錢木香二錢茴香二錢吳茱萸一錢湯泡同煎川楝苦寒入肝舒筋能導小腸膀胱之熱從小水下行為治疝君藥茴香暖胃散寒吳茱萸溫肝燥濕木香行三焦通氣疝氣方丹溪用荔枝核梔子山楂枳殼益荔枝雙結狀類睪丸能入肚腎闢寒散滯梔子瀉火利水枳殼行氣破症山楂散瘀癧積睪音皋腎子也再入吳茱暖厥陰疝乃厥陰肝邪非腎病以肝脈絡陰器也長流水煎疝痛釋等分或為末空心服橘核丸濟生中川楝桂朴實延胡藻帶昆桃仁二木酒糊合㿗疝痛頑鹽酒吞橘核川楝子海藻海帶昆布桃仁各二兩桂心厚朴枳實延胡索木通木香各五錢酒糊為丸鹽湯或酒下橘核木香能入厥陰氣分而行氣桃仁延胡索能入厥陰氣分而活血川楝木通能導小腸膀胱之濕官桂能祛肝腎之寒枳實厚朴行結水而破宿血昆布藻帶寒行水而咸軟堅祛暑之劑五首附方十三物香薷飲局方豆朴先香薷辛溫香散能入脾肺發越陽氣以散蒸熱厚朴除濕散滿扁豆清暑和脾若云熱盛加黃連名黃連香薷飲活人治中暑熱盛口渴心煩或加苓草茯苓甘草名五物香薷飲利濕祛暑木瓜宣加木瓜名六味香薷飲木瓜茯苓治濕盛再加參耆與除術兼治內傷十味全六味加參耆陳皮白朮名十味香薷飲二香散合入香蘇飲五味香薷飲合香蘇飲香附紫蘇陳皮蒼朮名二香散治外感內傷身寒腹脹仍有藿薷湯香葛湯傳三物香薷飲合藿香正氣散名藿薷湯治伏暑吐瀉三物香薷飲加葛根名香葛湯治暑月傷風清暑益氣湯東垣參草耆當歸香味青陳皮曲柏葛根蒼白朮升麻澤瀉棗薑隨人參黃耆甘草炙當歸酒洗麥冬五味青皮麩炒陳皮留白神麯炒黃柏酒炒葛根蒼朮白朮土炒升麻澤瀉加薑棗煎熱傷氣參耆補氣斂汗濕傷脾二術燥濕強脾火旺則金病而水衰故用麥味保肺生津黃柏瀉火滋水青皮理氣而破滯當歸養血而和陰曲草和中而消食升葛以升清澤瀉以降濁也縮脾飲用清暑氣砂仁草果烏梅暨甘草葛根扁豆加吐瀉煩渴溫脾胃砂仁草果煨烏梅甘草炙各四兩扁豆炒研葛根各二兩暑必兼溫而濕屬脾土故用砂仁草果利氣溫脾扁豆解暑滲濕葛根升陽生津甘草補土和中烏梅清熱止渴古人治暑多用溫如香薷飲大順散之類暑為陰證此所謂潔古曰中熱為陽證為有餘中暑為陰證為不足經曰脈虛身熱得之傷暑大順散杏仁薑桂甘散寒燥濕斯為貴先將甘草白砂仁次入乾薑杏仁炒合肉桂為末每服一錢吳鶴皋曰此非治暑乃治暑月飲冷受傷之脾胃耳生脈散麥味與人參保肺清心治暑淫氣少汗多兼口渴病危脈絶急煎斟人參五分麥冬八分五味子九粒人參大補肺氣麥冬甘寒潤肺五味酸收斂肺並能瀉火生津蓋心主脈肺朝百脈補肺清心則氣充而脈復將死脈絶者服之能令復生夏月火旺爍金尤宜服之六一散滑石同甘草解肌行水兼清燥統治表裡及三焦熱渴暑煩瀉痢保滑石六兩甘草一兩燈心湯下亦有用薑湯下者滑石氣輕解肌質重瀉火滑能入竅淡能行水故能通治上下表里之濕熱甘草瀉火和中又以緩滑石之寒滑也益元散碧玉與雞蘇散砂黛薄荷加之好前方加辰砂名益元散取其清心加青黛名碧玉散取其涼肝加薄荷名雞蘇散取其散肺也利濕之劑十三首附方八五苓散仲景治太陽府太陽經熱傳入膀胱府者用之白朮澤瀉豬茯苓膀胱化氣添官桂利便消暑煩渴清豬苓茯苓白朮炒各十八銖澤瀉一兩六銖桂枝半兩每服三錢二苓甘淡利水澤瀉甘鹹瀉水能入肺腎而通膀胱導水以泄火邪加白朮者補土所以制水加官桂者氣化乃能出也經曰膀胱者州都之官津液藏焉氣化則能出矣除桂名為四苓散無寒但渴服之靈濕勝則氣不得施化故渴利其濕則渴自止豬苓湯仲景除桂與術加入阿膠滑石停豬苓茯苓澤瀉阿膠滑石各一兩滑石瀉火解肌最能行水吳鶴皋曰以諸藥過燥故加阿膠以存津液此為利濕兼瀉熱黃疸小便閉渴嘔寧五苓治濕勝豬苓兼熱勝小半夏加茯苓湯仲景行水散痞有生薑半夏一升茯苓三錢生薑半斤除茯苓名小半夏湯加桂除夏治悸厥茯苓甘草湯名彰加桂枝甘草除半夏名茯苓甘草湯仲景治傷寒水氣乘心厥而心下悸者先治其水卻治其厥火因水而下行則眩悸止而痞滿治矣腎著湯金匱內用乾薑茯苓甘草白朮襄傷濕身痛與腰冷亦名甘薑苓朮湯乾薑炮茯苓各四兩炙甘草白朮炒各二兩數藥行水補土此濕邪在經而未入腑臟者黃耆防己湯金匱除薑茯術甘薑棗共煎嘗此治風水與諸濕身重汗出服之良黃耆防己各一兩白朮七錢半甘草炙五錢加薑棗煎防己大辛苦寒通行十二經開竅行水黃耆生用達表白朮燥濕強脾並能止汗加甘草者益土所以制水又以緩防己之峻急也舟車丸河間牽牛及大黃遂戟芫花又木香青皮橘皮加輕粉燥實陽水卻相當口渴面赤氣粗便祕而腫脹者為陽水黑牽牛四兩炒大黃二兩酒浸甘遂面里煨芫花醋炒大戟面里煨青皮炒橘紅各一兩木香五錢輕粉一錢水丸牽牛大黃遂戟芫花行水厲藥木香青陳以行氣少加輕粉以透經絡然非實證不可輕投疏鑿飲檳榔及商陸苓皮大腹同椒目赤豆艽羌瀉木通煎益薑皮陽水服檳榔商陸茯苓皮大腹皮椒目赤小豆秦艽羌活澤瀉木通等分加薑皮棗煎艽羌散濕上升通瀉泄濕下降苓腹薑皮行水於皮膚椒豆商檳攻水於腹裡亦上下表里分消之意實脾湯嚴氏苓朮與木瓜甘草木香大腹加草蔻附薑兼厚朴虛寒陰水效堪誇便利不渴而腫脹者為陰水茯苓白朮土炒木瓜甘草木香大腹皮草豆蔻煨附子炒黑薑厚朴炒加薑棗煎脾虛補以苓朮甘草脾寒溫以蔻附黑薑脾濕利以茯苓大腹脾滯導以厚朴木香又土之不足由於木之有餘木瓜木香皆能平肝瀉木使木不剋土而脾和則土能制水而脾實矣經曰濕勝則地泥實土正所以制水也五皮飲淡寮用五般皮陳茯薑桑大腹奇陳皮茯苓皮薑皮桑白皮大腹皮或用五加皮易桑白脾虛膚脹此方司脾不能為胃行其津液故水腫半身以上宜汗半身以下宜利小便此為於瀉水之中仍寓調補之意皆用皮者水溢皮膚以皮行皮也羌活勝濕湯局方羌獨芎甘蔓藁木與防風濕氣在表頭腰重痛發汗升陽有異功風能勝濕升能降氣升則水自降不與行水滲濕同濕氣在表宜汗又風能勝濕故用風藥上升使濕從汗散羌活獨活各一錢川芎甘草炙藁本防風各五分蔓荊子三分如有寒濕加附子防己若除獨活芎蔓草除濕湯升麻蒼朮充除獨活川芎蔓荊子甘草加升麻蒼朮名羌活除濕湯治風濕身痛大橘皮湯治濕熱五苓六一二方綴陳皮木香檳榔增能消水腫及泄瀉用五苓散赤茯苓一錢豬苓澤瀉白朮桂各五分用六一散滑石六錢甘草一錢加陳皮錢半木香檳榔各三分每服五錢加薑煎小水併入大腸致小腸不利而大便泄瀉二散皆行水泄熱之藥加檳榔峻下陳皮木香理氣以利小便而實大便也水腫亦濕熱為病故皆治之茵陳蒿湯仲景治疸黃陰陽寒熱細推詳陽黃大黃梔子入瘀熱在裡口渴便閉身如橘色脈沉實者為陽黃茵陳六兩大黃二兩酒浸梔子十四枚茵陳發汗利水能泄太陰陽明之濕熱梔子導濕熱出小便大黃導濕熱出大便陰黃附子與乾薑黃柏二兩梔子十五枚甘草一兩按陽黃胃有瘀熱者宜下之如發熱者則勢外出而不內入不必汗下惟用梔子黃柏清熱利濕以和解之若小便利色白無熱者仲景作虛勞治用小建中湯八正散局方木通與車前萹蓄大黃滑石研甘草梢瞿麥兼梔子煎加燈草痛淋蠲一方有木香治濕熱下注口渴咽乾淋痛尿血小腹急滿木通燈草瞿麥降心火人小腸車前清肝火入膀胱梔子瀉三焦鬱火大黃滑石瀉火利水之捷藥萹蓄利便湧淋草梢入莖止痛雖治下焦而不專於治下必三焦通利水乃下行也萆薢分清飲石菖蒲甘草梢烏藥益智俱甘草梢減半余藥等分或益茯苓鹽煎服加鹽少許通心固腎濁精驅遺精白濁萆薢能泄厥陰陽明濕熱去濁分清烏藥疏逆氣而止便數益智固脾胃而開鬱結石菖蒲開九竅而通心甘草梢達腎莖而止痛使溫熱去而心腎通則氣化行而淋濁止矣此以疏泄為禁止者也縮泉丸益智同烏藥等分山藥為糊丸便數需鹽湯下治便數遺尿當歸拈痛湯東垣羌防升豬澤茵陳芩葛朋二術苦參知母草瘡瘍濕熱服皆應當歸酒洗羌活防風升麻豬苓澤瀉茵陳黃芩酒炒葛根蒼朮白朮土炒苦參知母並酒炒甘草炙羌活通關節防風散留濕苦參黃芩茵陳知母以泄熱當歸以和氣血升葛助陽而升清芩瀉泄濕而降濁參甘二術補正固中使苦寒不傷胃疏泄不損氣也劉宗厚曰此方東垣本治濕熱腳氣後人用治諸瘡甚驗潤燥之劑十三首附方二炙甘草湯仲景參薑桂麥冬生地大麻仁大棗阿膠加酒服虛勞肺痿效如神甘草炙人參生薑桂枝各三兩阿膠蛤粉各二兩生地一斤麥冬麻仁研各半升棗十二枚水酒各半煎仲景治傷寒脈結代心動悸及肺痿唾多千金翼用治虛勞寶鑑用治厄逆外臺用治肺痿參草麥冬益氣復脈阿膠生地補血養陰棗麻潤滑以緩脾胃薑桂辛溫以散餘邪滋燥養榮湯兩地黃芩甘歸芍及艽防艽防風藥潤劑爪枯膚燥兼風祕火爍金傷血液亡當歸酒洗二錢生地熟地白芍炒黃芩酒炒秦艽各一錢防風甘草各五分活血潤燥生津飲丹溪二冬熟地兼栝蔞桃仁紅花及歸芍利祕通幽善澤枯熟地當歸白芍各一錢天冬麥冬栝蔞各八分桃仁研紅花各五分韭汁牛乳飲丹溪反胃滋養榮散瘀潤腸奇五汁安中飲張任候薑梨藉三般加入用隨宜牛乳半斤韭菜汁少許滾湯頓服名韭汁牛乳飲牛乳六分韭汁薑汁藕汁梨汁各一分和服名五汁安中飲並治噎膈反胃噎膈由火盛血枯或有瘀血寒痰阻滯胃口故食入反出也牛乳潤燥養血為君韭汁藕汁消瘀益胃薑汁溫胃散痰梨汁消痰降火要審症用之或加陳酒亦佳以酒乃米成也潤腸丸東垣用歸尾羌桃仁麻仁及大黃歸尾羌活大黃各五錢桃仁火麻仁各一兩蜜丸歸尾桃仁潤燥活血羌活散火搜風大黃破結通幽麻仁潤腸利竅或加艽防皂角子風濕加秦艽防風皂角子燒存性研皂子得濕則滑善通便祕艽防治風風祕血祕善通腸治風燥血燥致大湯祕通幽湯東垣中二地俱桃仁紅花歸草濡升麻升清以降濁清陽不升則濁陰不降故大便不通生地熟地各五分桃仁研紅花當歸身甘草炙升麻各一錢噎塞便閉此方需有加麻仁大黃者當歸潤腸湯名殊以上藥皆潤燥通腸搜風順氣丸大黃蒸郁李麻仁山藥增防獨車前及檳枳菟絲牛膝山茱仍中風風祕及氣祕腸風下血總堪憑大黃九蒸九曬五兩火麻仁郁李仁去皮山藥酒蒸車前子牛膝酒蒸山茱肉三兩菟絲子酒浸防風獨活檳榔枳殼麩炒各一兩蜜丸防獨潤腎搜風檳枳順氣破滯大黃經蒸曬則性稍和緩同二仁滑利潤燥通幽牛膝車前下行利水加山藥山茱菟絲固本益陽不使過於攻散也消渴方丹溪中花粉連藕汁生地汁牛乳研粉連研為末諸汁調研或加薑汁蜜為膏服瀉火生津益血痊黃連瀉心火生地滋腎水藕汁益胃花粉生津牛乳潤燥益血白茯苓丸治腎消花粉黃連萆薢調二參熟地覆盆子石斛蛇床膍胵要膍胵音皮鴟即雞肫皮也茯苓花粉黃連萆薢人參玄參熟地黃覆盆子各一兩石斛蛇床子各七錢半雞肫皮三十具微炒蜜丸磁石湯下黃連降心火石斛平胃熱熟地玄參生腎水覆盆蛇床固腎精人參補氣花粉生津茯苓交心腎萆薢利濕熱膍胵治膈消磁石色黑屬水假之入腎也豬腎薺苨湯千金參茯神知芩葛草石膏因磁石天花同黑豆強中消渴此方珍下消之證莖長興盛不交精出名強中緣服邪術熱藥而毒盛也豬腎一具大豆一升薺苨人參石膏各三兩磁石綿裹茯神知母黃芩葛根甘草花粉各二兩先煮豆腎去滓以藥分三服知苓石膏以瀉邪火人參甘草以固正氣葛根花粉以生津薺苨黑豆最能解毒磁石豬腎引之人腎也地黃飲子易簡參耆草二地二冬枇斛參澤瀉枳實疏二腑躁煩消渴血枯含人參黃耆甘草炙天冬麥冬生地枇杷葉蜜炙石斛澤瀉枳實麩炒每服二錢參耆甘草以補其氣氣能生水二地二冬以潤其燥潤能益血石斛平胃枇杷補氣澤瀉瀉膀胱之火枳實宣大腸之滯使二腑清則心肺二臟之氣得以下降而渴自止酥蜜膏酒千金用飴糖二汁百部及生薑杏棗補脾兼潤肺聲嘶氣憊酒溫嘗酥蜜飴糖棗肉杏仁細研百部汁生薑汁共煎一炊久如膏溫酒細細咽服之清燥湯東垣二術與黃耆參苓連柏草陳皮豬澤升柴五味曲麥冬歸地痿方推治肺金受濕熱之邪痿躄喘促口乾便赤黃耆錢半蒼朮炒一錢白朮炒陳皮澤瀉各五分人參茯苓升麻各三分當歸酒洗生地麥冬甘草炙神麯炒黃柏酒炒豬苓各二分柴胡黃連炒各一分五味九粒煎肺屬辛金主氣大腸為庚金主津燥金受濕熱之邪則寒水生化源絶而痿躄喘渴諸症作矣參耆苓朮陳草補土以生金麥味保金而生水連柏歸地瀉火滋陰豬澤升柴升清降濁則燥金肅清水出高原而諸病平矣此方不盡潤藥因有清燥二字故附記於此然東垣所云清燥者蓋指肺與太陽為燥金也瀉火之劑二十七首附方九黃連解毒湯毒即火熱也四味黃柏黃芩梔子備等分躁狂大熱嘔不眠吐血衄鼻血音女六切斑黃均可使若云三黃石膏湯再加麻黃及淡鼓見表裡此為傷寒溫毒盛三焦表裡相兼治梔子金花丸加大黃黃芩黃柏黃連梔子大黃水丸潤腸瀉熱真堪倚附子瀉心湯仲景用三黃寒加熱藥以維陽芩連各一兩大黃二兩附子一枚炮恐三黃重損其陽故加附子痞乃熱邪寒藥治傷寒痞滿從外之內滿在胸而不在胃多屬熱邪故宜苦瀉若雜病之痞從內之外又宜辛熱惡寒加附始相當經曰心下痞按之軟關脈浮者大黃黃連瀉心湯心下痞而復惡寒汗出者附子瀉心腸大黃附子湯同意溫藥下之妙異常大黃細辛各二兩附子一枚炮金匱陽中有陰宜以溫藥下其寒後人罕識其旨半夏瀉心湯仲景黃連芩乾薑甘草與人參大棗和之治虛痞法在降陽而和陰半夏半斤黃連一兩乾薑黃芩甘草炙人參各三兩大棗十二枚治傷寒下之早胸滿而不痛者為痞身寒而嘔飲食不下非柴胡證凡用瀉心者多屬誤下非傳經熱邪否而不泰為痞瀉心者必交陰陽通上下者必和其中故用參甘大棗白虎湯仲景用石膏偎知母甘草梗米陪石膏一斤知母六兩甘草二兩粳米六合亦有加入人參者名人參白虎湯燥煩熱渴舌生苔白虎西方金神此方清肺金而瀉胃火故名然必實熱方可用之或有血虛身熱脾虛發熱及陰盛格陽類白虎湯證誤投之不可救也按白虎證脈洪大有力類白虎證脈大而虛以此為辨又當觀小便赤者為內熱白者為內寒也竹葉石膏湯仲景人參麥冬半夏竹葉靈甘草生薑兼粳米暑煩熱渴脈虛尋竹葉二把石膏一斤人參三兩甘草炙三兩麥冬一升半夏粳米各半升加薑煎治傷寒解後嘔渴少氣竹葉石膏之辛寒以散餘熱參甘粳麥之甘平以補虛生津薑夏之辛溫以豁痰止嘔升陽散火湯東垣葛升柴羌獨防風參芍儕生炙二草加薑棗陽經火鬱發之佳柴胡八錢葛根升麻羌活獨活白芍各五錢防風二錢半炙甘草三錢生甘草二錢每服五錢加薑棗煎火發多在肝膽之經以木盛能生火而二經俱挾相火故以柴胡散肝為君羌防以發太陽之火升葛以發陽明之火獨活以發少陰之火加參甘者補土以泄火加白芍者瀉肝而益脾但令散中有補發中有收也涼膈散局方硝黃梔子翹黃芩甘草薄荷饒竹葉蜜煎療膈上葉生竹上故治上焦中焦燥實服之消連翹四兩大黃酒浸芒硝甘草各二兩梔子炒黑黃芩酒炒薄荷各一兩為末每服三錢加竹葉生蜜煎連翹薄荷竹葉以升散於上梔芩硝黃以推瀉於下使上升下行而膈自清矣加甘草生蜜者病在膈甘以緩之也潘思敬曰仲景調胃承氣湯後人加味一變而為涼膈散再變而為防風通聖散清心蓮子飲局方石蓮參地骨柴胡赤茯苓耆草麥冬車前子躁煩消渴及崩淋石蓮人參柴胡赤茯苓黃耆各三錢黃芩酒炒地骨皮麥冬車前子甘草炙各二錢參耆甘草補虛瀉火柴胡地骨退熱平肝黃芩麥冬清熱上焦赤茯苓車前利濕下部中以石蓮交其心腎也甘露飲局方兩地生熟與茵陳芩枳枇杷黃芩枳殼枇杷葉石斛倫甘草二冬天麥平胃熱等分煎二地甘石斛平脾胃之虛熱清而兼補黃芩茵陳折熱而去溫枳殼枇杷抑氣而降火桂苓犀角可加均加茯苓肉桂名桂苓甘露飲本事方加犀角通治胃中之溫熱口瘡吐衄清胃散東垣用升麻黃連當歸生地牡丹全或益石膏平胃熱口瘡吐衄口血鼻血及牙宣齒齦出血黃連瀉心火亦瀉脾火丹皮生地平血熱當歸引血歸經石膏瀉陰陽之火升麻升陽明之清昂按古人治血多用升麻然上升之藥終不可輕施瀉黃散甘草與防風石膏梔子藿香充炒香蜜酒調和服胃熱口瘡並見功防風四兩甘草二兩黑梔子一兩藿香七錢石膏五錢梔子石膏瀉肺胃之火藿香辟惡調中甘草補脾瀉熱重用防風者能發脾中伏火又能於土中瀉木也錢乙瀉黃散升防芷芩夏石斛同甘枳亦治胃熱及口瘡火鬱發之斯為美升麻防風白芷各錢半黃芩枳殼半夏石斛各一錢甘草七分升防白芷以散胃火芩夏枳殼以清熱開鬱石斛甘草以平胃調中瀉白散錢乙桑皮地骨皮甘草粳米四般宜桑白皮地骨皮各一錢甘草五分粳米百粒桑皮瀉肺火地骨退虛熱甘草補土生金粳米和中清肺李時珍曰此瀉肺諸方之準繩也參茯知芩皆可入人參茯苓知母黃芩聽加名加減瀉白散肺炎喘嗽此方施瀉青丸錢乙用龍膽梔下行瀉火大黃資羌防升上芎歸潤火鬱肝經用此宜龍膽草黑梔子大黃酒蒸羌活防風川芎當歸酒洗等分蜜丸竹葉湯下羌防引火上升梔膽大黃抑火下降芎歸養肝血而潤肝燥龍膽瀉肝湯局方梔芩柴生地車前澤瀉偕木通甘草當歸合肝經濕熱力能排膽草酒炒梔子酒炒黃芩酒炒生地酒炒柴胡車前子澤瀉木通當歸甘草生用龍膽柴胡瀉肝膽之火黃芩梔子瀉肺與三焦之熱以佐之澤瀉瀉腎經之濕木通車前瀉小腸膀胱之濕以佐之歸地養血補肝甘草緩中益胃不令苦寒過於泄下也當歸龍薈丸宣明用四黃龍膽蘆薈木麝香黑梔青黛薑湯下一切肝火盡能攘當歸酒洗膽草酒洗梔子炒黑黃連酒炒黃柏酒炒黃芩酒炒各一兩大黃酒浸青黛水飛蘆薈各五錢木香二錢麝香五分蜜丸薑湯下肝木為生火之原諸經之火因之而起故以青黛龍膽入木經而直折之而以大黃芩連梔柏通平上下三焦之火也蘆薈大苦大寒氣臊入肝恐諸藥過於寒瀉故用當歸養血補肝用薑湯辛溫為引加木麝者取其行氣通竅也然非實熱不可輕投左金丸丹溪茱蓮六一丸肝經火鬱吐吞酸黃連六兩薑汁炒吳茱萸一兩鹽湯泡亦名茱連丸肝實則作痛或嘔酸心為肝子故用黃連瀉心清火使火不剋金則金能制木而肝平矣吳茱萸能入厥陰行氣解鬱又能引熱下行故以為反佐寒者正治熱者反治使之相濟以立功也左金者使肺右之金得行於左而平肝也再加芍藥名戊己丸熱瀉熱痢服之安戊為胃土己為脾土加芍藥伐肝安脾使木不剋土連附六一湯治胃痛寒因熱用理一般黃連六兩附子一兩亦反佐也導赤散錢乙生地與木通甘草梢竹葉四般攻口糜淋痛小腸火引熱同歸小便中等分煎生地涼心血竹葉清心氣木通瀉心火入小腸草梢達腎莖而止痛清骨散用銀柴胡胡連秦艽鱉甲符地骨青蒿知母草骨蒸勞熱保無虞銀柴胡錢半胡黃連秦艽鱉甲童便炙地骨皮青蒿知母各一錢甘草炙五分地骨胡連知母以平內熱柴胡青蒿秦艽以散表邪引諸藥入骨而補陰甘草和諸藥而瀉火普濟消毒飲東垣芩連鼠玄參甘桔藍根侶升柴馬勃連翹陳殭蠶薄荷為末咀黃芩酒炒黃連酒炒各五錢人參甘草生用桔梗柴胡陳皮去白各二錢鼠黏子板藍根馬勃連翹薄荷各一錢殭蠶升麻各七分末服或蜜丸噙化或加人參及大黃虛者加人參便祕加大黃大頭天行力能御大頭天行親戚不相訪問染者多不救原文曰芩連瀉心肺之火為君玄參陳皮甘草瀉火補肺為臣連翹薄荷鼠黏藍根殭蠶馬勃散腫消毒定喘為佐升麻柴胡散陽明少陽二經之陽桔梗為舟楫不令下行為載李東垣曰此邪熱客心肺之間上攻頭面為腫以承氣湯瀉之是為誅伐無過遂處此方全活甚衆清震湯河間治雷頭風升麻蒼朮兩般充二味局方名升麻湯荷葉一枚升胃氣邪從上散不傳中頭面腫痛疙瘩名雷頭風一雲頭如雷鳴東垣曰邪在三陽不可過用寒藥重劑誤伐無過處清震湯升陽解毒蓋取震為雷之義桔梗湯濟生中用防已桑皮貝母栝蔞子甘枳當歸薏杏仁黃耆百合薑煎此桔梗防己栝蔞貝母當歸枳殼薏苡仁桑白皮各五分黃耆七分杏仁百合甘草各三分薑煎肺癰吐膿或咽乾便祕大黃可加使一方有人參無枳殼黃耆補肺氣杏仁薏仁桑皮百合補肺清火栝蔞貝母潤肺除痰甘桔開提氣血利膈散寒防己散腫除風瀉濕清熱當歸以和血枳殼以利其氣清咽太平丸薄荷芎柿霜甘桔及防風犀角蜜丸治熱膈早間咯血頰常紅兩頰肺肝之部早間寅卯木旺之時木盛生火來克肺金薄荷十兩川芎柿霜甘草防風犀角各二兩桔梗三兩蜜丸川芎血中氣藥散瘀升清防風血藥之使搜肝瀉肺薄荷理血散熱清咽除蒸犀角涼心清肝柿霜生津潤肺甘草緩炎上之火勢桔梗載諸藥而上浮清斑青黛飲陶節庵梔連犀知母玄參生地齊石膏柴胡人參甘草便實參去大黃躋去人參加入大黃薑棗煎加一匙醋陽邪裡實此方稽發斑雖由胃熱亦諸經之火有以助之青黛黃連清肝火梔子清胃火引以柴胡使達肌表使以薑棗以和營衛熱毒入里亦由胃虛故以人參甘草益胃加醋者酸以收之也辛夷散嚴氏里藁本防風白芷升麻與木通芎細川芎細辛甘草茶調服鼻生息肉此方攻肺經濕熱上蒸於腦入鼻而生息肉猶濕地得熱而生芝菌也諸藥等分末服三錢辛夷升麻白芷能引胃中清陽上行頭腦防風藁本能入巔頂燥濕祛風細辛散熱通竅川芎散郁疏肝木通茶清瀉火下行甘草甘平緩其辛散也蒼耳散陳無擇中用薄荷辛夷白芷四般和蔥茶調服疏肝肺清升濁降鼻淵瘥蒼耳子炒二錢半薄荷辛夷各五錢白芷一兩末服凡頭面之疾皆由清陽不升濁陰逆上所致濁氣上爍於腦則鼻流濁涕為淵數藥升陽通竅除濕散風故治之也妙香散王荊公山藥與參耆甘桔二茯遠志隨少佐辰砂木香麝驚悸鬱結夢中遺山藥二兩乳汁炒人參黃耆蜜炙茯苓茯神遠志炒各一兩桔梗甘草各三錢辰砂二錢木香二錢半麝香一錢為末每服二錢酒下山藥固精參耆補氣遠志二茯清心寧神桔梗木香疏肝清肺丹麝鎮心散郁辟邪甘草補中協和諸藥使精氣神相依邪火自退不用固澀之藥為泄遺良劑以其安神利氣故亦治驚悸鬱結除痰之劑十首附方五二陳湯局方用半夏陳益以茯苓甘草臣半夏薑製二錢陳皮去白茯苓各一錢甘草五分加薑煎利氣調中兼去濕一切痰飲此為珍陳皮利氣甘草和中苓夏除濕氣順濕除痰飲自散導痰湯內加星枳頑痰膠固力能馴加膽星以助半夏加枳實以成沖牆倒壁之功若加竹茹與枳實湯名溫膽可寧神二陳湯加竹茹枳實名溫膽湯治膽虛不眠潤下丸丹溪僅陳皮草利氣祛痰妙絶倫陳皮去白八兩鹽五兩水浸洗甘草二兩蜜炙蒸餅糊丸薑湯下或將陳皮鹽水煮曬同甘草為末名二腎散不可多服恐損元氣滌痰湯嚴氏用半夏星甘草橘紅參茯苓竹茹菖蒲兼枳實痰迷舌強服之醒治中風痰迷心竅舌強不能言半夏薑製膽星各二錢半橘紅枳實茯苓各三錢人參菖蒲各一錢竹茹七分甘草五分加薑煎此即導痰湯加人參扶正菖蒲開痰竹茹清金青州白丸星夏並白附川烏俱用生曬露糊丸薑薄引風痰癱瘓小兒驚半夏水浸生衣七兩南星白附子各二兩川烏去皮臍五錢四味俱生用為末袋盛水擺出粉再擂再擺以盡為度瓷盆盛貯日曬夜露春五夏三秋七冬十日糯米糊丸薑湯下癱瘓酒下驚風薄荷湯下痰之主也由於風寒濕星夏辛溫祛痰燥濕烏附辛熱散寒逐風浸而曝之殺其毒也清氣化痰丸星夏橘杏仁枳實栝蔞實芩苓薑汁為糊丸氣順火消痰自失半夏薑製膽星各兩半橘紅枳實麩炒杏仁去皮尖栝蔞仁去油黃芩酒炒茯苓各一兩薑製糊丸淡薑湯下氣能發火火能生痰陳杏降逆氣枳實破滯氣芩瓜平熱氣星夏燥濕氣茯苓行水氣水濕火熱皆生痰之本也故化痰必以清氣為先順氣消食化痰丸瑞竹堂青皮星夏萊蔔子攢曲麥山楂葛杏附蒸餅為糊薑汁搏半夏薑製膽星各一斤陳皮去白青皮蘇子沉香水炒萊蔔子生薑麥芽炒神麯炒山楂炒葛根杏仁去皮尖炒香附醋炒各一兩薑汁和蒸餅為糊丸痰由濕生星夏燥濕痰因氣升蘇子杏仁降氣痰因氣滯青陳香附導滯痰生於酒食曲葛解酒楂麥消食濕去食消則痰不生氣順則喘滿自止矣滾痰丸王隱君用青礞石大黃黃芩沉木香百病多因痰作祟頑痰怪證力能匡青礞石一兩用焰硝一兩同入瓦罐鹽泥固濟煅至石色如金為度大黃酒蒸黃芩酒洗各八兩沉香五錢為末水丸薑湯下量虛實服礞石慓悍能攻陳積伏匿之痰大黃蕩熱實以開下行之路黃芩涼心肺以平上僭之火沉香能升降諸氣以導諸藥為使然非實體不可輕投金沸草散活人前胡辛半夏荊甘赤茯因煎加薑棗除痰嗽肺感風寒頭目顰旋覆花前胡細辛各一錢半夏五分荊芥錢半甘草炙三分赤茯苓六分風熱上壅故生痰作嗽荊芥發汗散風前胡旋覆消痰降氣半夏燥痰散逆甘草發散緩中細辛溫經茯苓利濕用赤者入血分而瀉丙丁也局方金沸草散不用細辛茯加入麻黃赤芍均治同半夏天麻白朮湯東垣參耆橘柏及乾薑苓瀉麥芽蒼朮曲太陰痰厥頭痛良半夏麥芽各錢半白朮神麯炒各一錢人參黃耆陳皮蒼朮茯苓澤瀉天麻各五分乾薑三分黃柏酒洗二分痰厥非半夏不能除風虛非天麻不能定二術燥濕益氣參耆瀉火補中陳皮調氣升陽苓瀉瀉熱導水曲麥化滯助脾乾薑以滌中寒黃柏以瀉在泉少火也常山飲局方中知貝取烏梅草果檳榔聚薑棗酒水煎露之劫痰截瘧功堪詡常山燒酒炒二錢知母貝母草果煨檳榔各一錢烏梅二個一方加穿山甲甘草瘧未發時面東溫服知母治陽明獨勝之熱草果治太陰獨勝之寒二經和則陰陽不致交爭矣常山吐痰行水檳榔下氣破積貝母清火散痰烏梅斂陰退熱須用在發散表邪及提出陽分之後為宜截瘧七寶飲易簡常山果檳榔朴草青陳多水酒合煎露一宵陽經實瘧服之妥常山酒炒草果煨檳榔厚朴青皮陳皮甘草等分水酒各半煎露之發日早晨面東溫服常山吐痰檳榔破積陳皮利氣青皮伐肝厚朴平胃草果消膏梁之痰加甘草入胃佐常山引吐也收澀之劑九首附方二金鎖固精丸芡蓮鬚龍骨蒺藜牡蠣需蓮粉為糊丸鹽酒下澀精祕氣滑遺無芡實蒸蓮蕊須沙苑蒺藜炒各二兩龍骨酥炙牡蠣鹽水煮一日夜煅粉各一兩蓮子粉為糊丸鹽湯吞服或酒下芡實固精補脾牡蠣澀精清熱蓮子交通心腎蒺藜補腎益精龍骨蓮鬚皆固精收脫之品茯菟丹局方療精滑脫菟苓五味石蓮末酒煮山藥為糊丸亦治強中及消渴強中者下消之人莖長興盛不交精出也菟絲子十兩酒浸五味子八兩白茯苓石蓮各三兩山藥六兩酒煮為糊丸漏精鹽湯下赤濁燈心湯下白濁茯苓湯下消渴米飲下菟絲強陰益陽五味澀精生水石蓮精心止濁山藥利濕固脾茯苓甘淡而滲於補之中能泄腎邪也治濁固本丸蓮蕊須砂仁連柏二苓俱益智半夏同甘草清熱利濕固兼軀固本之中兼利濕熱蓮鬚黃連炒各二兩砂仁黃柏益智仁半夏薑製茯苓各一兩豬苓二兩甘草炙三錢精濁多由濕熱與痰連柏清熱二苓利濕半夏除痰濕熱多由鬱滯砂智利氣兼能固腎強脾甘草補土和中蓮鬚則澀以止脫也訶子散東垣用治寒瀉炮薑粟殼橘紅也訶子煨七分炮薑六分罌粟殼去蒂蜜炙橘紅各五分末服粟殼固腎澀腸訶子收脫住瀉炮薑逐冷補陽陳皮升陽調氣河間訶子散木香訶草連仍用術芍煎湯下訶子一兩半生煨木香五錢黃連三錢甘草二錢為末煎白朮白芍湯調服久瀉以此止之不止者加入厚朴二錢二方藥異治略同亦主脫肛便血者桑螵蛸散寇宗奭治便數參苓龍骨同龜殼菖蒲遠志及當歸補腎寧心健忘覺桑螵蛸鹽水炒茯苓一用茯神龍骨煅龜板酥炙菖蒲鹽炒遠志當歸等分為末臨臥服二錢人參湯下治小便數而欠補心虛安神虛則便數故以人參螵蛸補之熱則便欠故以龜板滋之當歸潤之菖蒲茯苓遠志並能清心熱而通心腎使心行則小腸之腑自寧也真人養臟湯羅謙甫訶粟殼肉蔻當歸桂木香術芍參甘為澀劑脫肛久痢早煎嘗訶子面里裹煨一兩二錢罌粟殼去蒂蜜炙三兩六錢肉豆蔻面里裹煨五錢當歸白朮炒白芍酒炒人參各六錢木香二兩四錢桂八錢生甘草一兩八錢每服四錢臟寒甚加附子一方無當歸一方有乾薑脫肛由於虛寒參朮甘草以補其虛官桂豆蔻以溫其寒木香調氣當歸和血芍藥酸以收斂訶子粟殼澀以止脫當歸六黃湯治汗出醒而汗出曰自汗寐而汗出曰盜汗耆柏芩連生熟地當歸黃柏黃連黃芩二地等分黃耆加倍瀉火固表復滋陰汗由陰虛歸地以滋其陰汗由火擾黃芩柏連以瀉其火汗由表虛倍用黃耆以固其表加麻黃根功更異李時珍曰麻黃根走表能引諸藥至衛分而固腠理或云此藥太苦寒胃弱氣虛在所忌柏子仁丸人參術麥麩牡蠣麻黃根再加半夏五味子陰虛盜汗棗丸吞柏子仁炒研去油二兩人參白朮牡蠣煅麻黃根半夏五味子各一兩麥麩五錢棗肉丸米飲下心血虛則臥而汗即出柏仁養心寧神牡蠣麥麩涼心收脫五味斂汗半夏燥濕麻黃根專走肌表引參術以固衛氣陽虛自汗牡蠣散黃耆浮麥麻黃根牡蠣煅研黃耆麻黃根各一錢浮小麥百粒煎牡蠣浮麥涼心止汗黃耆麻黃根走肌表而固衛撲法芎藁牡蠣粉撲汗法白朮藁本川芎各二錢半糯米粉兩半為末袋盛周身補之或將龍骨牡蠣捫龍骨牡蠣為末合糯米粉等分亦可撲法殺蟲之劑二首烏梅丸仲景用細辛桂人參附子椒薑繼黃連黃柏及當歸溫臟安蛔寒厥劑烏梅三百個醋浸蒸細辛桂枝附子炮人參黃柏各六兩黃連一斤乾薑十兩川椒去汗當歸各四兩治傷寒厥陰證寒厥吐蛔蟲得酸則伏故用烏梅得苦則安故用連柏蛔因寒而動故用附子程郊倩曰名曰安蛔實是安胃故仲景云並主下痢化蟲丸鶴蝨及使君檳榔蕪荑苦楝群白礬胡粉糊丸服腸胃諸蟲永絶氛檳榔鶴蝨苦楝根東引者胡粉炒各一兩使君子蕪荑各五錢枯礬一錢半麵糊丸亦可末服數藥皆殺蟲之品單服尚可治之匯萃為丸而蟲焉有不死者乎癰瘍之劑六首附方二真人活命飲金銀花防芷歸陳草節加貝母天花兼乳沒穿山角刺酒煎嘉金銀花二錢當歸酒洗陳皮去白各錢半防風七分白芷甘草節貝母天花粉乳香各一錢沒藥五分二味另研候藥熟下皂角刺五分穿山甲三大片銼蛤粉炒去粉用好酒煎服恣飲盡醉忍冬甘草散熱解毒癰瘡聖藥花粉貝母清痰降火防風白芷燥濕排膿當歸和血陳皮行氣乳香托裡護心沒藥散瘀消腫山甲角刺透經絡而潰堅加酒以行藥勢也一切癰疽能潰散已成者潰未成者散潰後忌服用毋差大黃便實可加使鐵器酸物勿沾牙金銀花酒加甘草奇瘍惡毒皆能保金銀花五兩生者更佳甘草一兩水煎一日一夜服盡護膜須用蠟礬丸黃蠟二兩白礬一兩溶化為丸酒服十丸加至百丸則有力使毒不攻心一方加雄黃名雄礬丸蛇咬尤宜服之二方均是瘍科寶托裡十補散即局方十宣散參耆芎歸桂白芷及防風甘桔厚朴酒調服癰瘍脈弱賴之充人參黃耆當歸各二錢川芎桂心白芷防風甘草桔梗厚朴各一錢熱酒調服參耆補氣當歸和血甘草解毒防風發表厚朴散滿桂枝桔梗排膿表裡氣血交治共成內托之功托裡溫中湯孫彥和薑附羌茴木丁沉共四香陳皮益智兼甘草寒瘍內陷嘔瀉良附子炮四錢炮薑羌活各三錢木香錢半茴香丁香沉香益智仁陳皮甘草各二錢加薑五片煎治瘡瘍變寒內陷心痞便溏厄逆昏瞶瘍寒內陷故用薑附溫中助陽羌活通關節炙草益脾元益智丁沉以止厄進食茴木陳皮以散滿除痞此孫彥和治王伯祿臂瘍盛夏用此亦舍時從證之變法也托裡定痛湯四物兼地黃川芎當歸白芍乳香沒藥桂心添再加蜜炒罌粟殼潰瘍虛痛去如拈罌粟殼收澀能止諸痛四物活血托裡充肌乳香能引毒氣外出不致內攻與沒藥並能消腫止痛散腫潰堅湯東垣知柏連花粉黃芩龍膽宣升柴翹葛兼甘桔歸芍稜莪昆布全黃芩八錢半酒炒半生用知母黃柏酒炒花粉膽草酒炒桔梗昆布各五錢柴胡四錢升麻連翹甘草炙三稜酒炒莪朮酒洗炒各三錢葛根歸尾酒洗白芍酒炒各二錢每服五六錢先浸後煎連翹升葛解毒升陽甘桔花粉排膿利膈歸芍活血昆布散痰稜莪破血行氣龍膽知柏芩連大瀉諸經之火也經産之劑十二首附方二十二婦人諸病與男子同惟行經妊娠則不可以例治故立經産一門海藏妊娠六合湯四物為君妙義長當歸地黃川芎白芍傷寒表虛地骨桂表虛自汗發熱惡寒頭痛脈浮四物四兩加桂枝地骨皮各七錢二藥解肌實表名表虛六合湯表實細辛兼麻黃頭痛身熱無汗脈緊四物四兩加細辛麻黃各五錢二藥溫經發汗名表實六合湯少陽柴胡黃芩入寒熱脅痛心煩喜嘔口苦脈弦為少陽證加柴胡解表黃芩清裡名柴胡六合湯陽明石膏知母藏大熱煩渴脈大而長為陽明證加白虎湯清肺瀉胃名石膏六合湯小便不利加芩瀉加茯苓澤瀉利水名茯苓六合湯不眠黃芩梔子良汗下後不得眠加黃芩梔子養陰除煩名梔子六合湯風濕防風與蒼朮兼風兼濕肢節煩痛心熱脈浮加防風搜風蒼朮燥濕名風濕六合湯發斑蘊毒升翹將下後不愈蘊毒發斑如錦紋者加升麻連翹散火解毒名升麻六合湯胎動血漏名膠艾傷寒汗下後胎動漏血加阿膠艾葉養血安胎名膠艾四物湯虛痞朴實頗相當胸滿痞脹加厚朴枳實炒散滿消痞名朴實六合湯脈沉寒厥亦桂附身冷拘急腹痛脈沉亦有不得已而加附子肉桂散寒回陽者名附子六合湯便祕蓄血桃仁黃大便祕小便赤而脈實數或膀胱蓄血亦有加桃仁大黃潤燥通幽者名大黃六合湯安胎養血先為主余因各症細參詳後人法此治經水過多過少別溫涼溫六合湯加芩術加黃芩白朮治經水過多黃芩抑陽白朮補脾脾能統血色黑後期連附商加黃連清熱香附行氣名連附六合湯熱六合湯梔連益加梔子黃連治血熱妄行寒六合湯加附薑加炮薑附子治血海虛寒氣六合湯加陳朴加陳皮厚朴治氣鬱經阻風六合湯加艽羌加秦艽羌活治血虛風痙此皆經産通用劑説與時師好審量膠艾湯金匱中四物先阿膠艾葉甘草全阿膠川芎甘草各二兩艾葉當歸各三兩芍藥地黃各四兩酒水煎內阿膠煬化服四物養血阿膠補陰艾葉補陽甘草和胃加酒行經婦人良方單膠艾亦名膠艾湯胎動血漏腹痛痊膠艾四物加香附香附用童便鹽水酒醋各浸三日炒方名婦寶丹調經專當歸散金匱益婦人妊術芍芎歸及子芩安胎養血宜常服産後胎前功效深婦人懷妊宜溫服之臨盆易産自無衆疾當歸川芎芍藥黃芩各一斤白朮半斤為末酒調服丹溪曰黃芩白朮安胎之聖藥蓋懷妊宜清熱涼血血不妄行則胎安黃芩養陰退陽能除胃熱白朮補脾亦除胃熱脾胃健則能化血養胎自無半産胎動血漏之患也黑神散局方中熟地黃歸芍甘草桂炮薑蒲黃黑豆童便酒消瘀下胎痛逆忘瘀血攻衝則作痛胞胎不下亦由血滯不行諸藥各四兩黑豆炒去皮半斤酒童便合煎熟地歸芍潤以濡血蒲黃黑豆滑以行血黑薑官桂熱以動血緩以甘草散以童便行以酒力也清魂散局方用澤蘭葉人參甘草川芎協荊芥理血兼祛風産中昏暈神魂帖澤蘭人參甘草炙各三分川芎五分荊芥一錢酒調下川芎澤蘭和血人參甘草補氣外感風邪荊芥能疏血中之風肝藏魂故曰魂魂羚羊角散本事方杏薏仁防獨芎歸又茯神酸棗木香和甘草子癇風中均回春羚羊角屑一錢杏仁薏仁防風獨活川芎當歸茯神棗仁炒各五分木香甘草各二分半加薑煎治妊娠中風涎潮僵仆口噤搐掣名子癇羚羊平肝火防獨散風邪棗茯以寧心神芎歸以和血杏仁木香以利氣薏仁甘草以調脾當歸生薑羊肉湯金匱當歸三兩生薑五兩羊肉一斤産中腹痛褥勞匡産後發熱自汗身痛名褥勞腹痛者瘀血未去則新血自不生也亦有加入參耆者氣能生血羊肉辛熱用氣血之屬以補氣血當歸引入血分生薑引入氣分以生新血加參耆者氣血交補也千金四物甘桂薑千金羊肉湯芎歸芍地甘草乾薑肉桂加羊肉煎達生散丹溪達小羊也取其易生紫蘇大腹皮參朮甘陳歸芍隨再加蔥葉黃楊腦孕婦臨盆先服之大腹皮三錢紫蘇人參白朮土炒陳皮當歸酒洗白芍酒洗各一錢甘草炙三錢青蔥五葉黃楊腦七個煎歸芍以益其血參術以補其氣陳腹蘇蔥以疏其壅不虛不滯産自無難矣若將川芎易白朮名紫蘇飲子嚴氏子懸宜胎氣不和上衝心腹名子懸妊娠轉胞參朮飲丹溪轉胞者氣血不足或痰飲阻塞胎為胞逼壓在一邊故臍下急痛而小便或數或閉也芎芍當歸熟地黃炙草陳皮留白兼半夏氣升胎舉自如常此即人參湯除茯苓加陳皮半夏以除痰加薑煎牡丹皮散婦人良方延胡索歸尾桂心赤芍藥牛膝稜莪酒水煎氣行瘀散血瘕削瘀血凝聚則成瘕丹皮延胡索桂心各三分赤芍牛膝莪朮各六分三稜四分酒水各半煎桂心丹皮赤芍牛膝以行其血三稜莪朮歸尾延胡索兼行血中氣滯氣中血滯則結者散矣固經丸婦人良方用龜板君黃柏樗皮香附群黃芩芍藥酒丸服漏下崩中色黑殷治經多不止色紫黑者屬熱龜板炙四兩黃柏酒炒芍藥酒炒各二兩樗皮炒香附童便浸炒各兩半黃芩酒炒二兩酒丸陰虛不能制胞絡之火故經多龜板芍藥滋陰壯水黃芩清上焦黃柏瀉下焦香附辛以散郁樗皮澀以收脫柏子仁丸良方熟地黃牛膝續斷澤蘭芳卷柏加之通血脈經枯血少腎肝匡柏子仁去油牛膝酒浸卷柏各五錢熟地一兩續斷澤蘭各三兩蜜丸米飲下經曰心氣不得下降則月事不來柏子仁安神養心熟地續斷牛膝補肝益腎澤蘭卷柏活血通經附便用雜方三首望梅丸訒庵用鹽梅肉蘇葉薄荷與柿霜茶末麥冬糖共搗旅行齎服勝瓊漿鹽梅肉四兩麥冬去心薄荷葉去梗柿霜細茶各一兩紫蘇葉去梗五錢為極細末白霜糖四兩共搗為丸雞子大旅行帶之每含一丸生津止渴加參一兩尤妙骨灰固齒牙散豬羊骨臘月醃成煅研之骨能補骨咸補腎堅牙健啖老尤奇用臘月醃豬羊骨火煅細研每晨擦牙不可間斷至老而其效益彰頭上齒骨亦佳軟腳散中芎芷防細辛四味研如霜輕撒鞋中行遠道足無針疱汗皆香防風白芷各五錢川芎細辛各二錢半為末行遠路者撒少許於鞋內步履輕便不生針疱足汗皆香小兒稀痘方一首附方三稀痘神米以功丹三種豆粉草細末竹筒裝臘月廁中浸洗淨風乾配入梅花良絲瓜藤絲煎湯服一年一次三年光用赤小豆黑豆緑豆粉草各一兩細末入竹筒中削皮留節鑿孔入藥杉木塞緊溶蠟封固浸臘月廁中一月取出洗浸風乾每藥一兩臘月梅花片三錢以雪中花片落地者不著人手以針刺取更妙如急出用入紙套中略烘即干兒大者服一錢小者五分以霜後絲瓜藤上小藤絲煎湯空腹服忌葷腥十二日解出黑糞為驗每年服一次二次可稀三次永不出矣又方蜜調忍冬末顧驤宇不住服之效亦強金銀花為末糖調不住服之更有玄參菟絲子婁江王相公蜜丸如彈空心嘗白酒調化日二次菟絲子半斤酒浸二宿煮乾去皮玄參四兩共為細末蜜丸彈子大白酒調下每日二次或加犀麥生地黃又方加生地麥冬四錢犀角二兩此皆驗過稀痘法為力簡易免倉皇
