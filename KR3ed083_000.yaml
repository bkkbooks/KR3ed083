body:
  text: 敘古人治病藥有君臣方有奇偶劑有大小此湯頭所由來也仲景為方書之祖其傷寒論中既曰太陽證少陽證太陰證少陰證矣而又曰麻黃證桂枝證柴胡證承氣證等不以病名病而以藥名病明乎因病施藥以藥合證而後用之豈苟然而已哉令人不辨證候不用湯頭率意任情治無成法是猶制器而廢準繩行陳而棄行列欲以已病卻疾不亦難乎蓋古人制方佐使君臣配合恰當從治正治意義深長如金科玉律以為後人楷則惟在善用者神而明之變而通之如淮陰背水之陳諸將疑其不合兵法而不知其正在兵法之中也舊本有湯頭歌訣辭多鄙率義弗賅明難稱善本不揣愚瞽重為編輯並以所主病證括入歌中間及古人用藥制方之意某病某湯門分義悉理法兼備體用具全千古心傳端在於此實醫門之正宗活人之彀率也然古方甚多難以盡録量取便用者得歌二百首正方附方共三百有奇蓋易則易知簡則易從以此提綱挈領苟能觸類旁通可應無窮之變也是在善讀者加之意耳康熙甲戌夏月休寧八十老人汪昂題凡例一本集諸歌悉按沈約詩韻其中平仄不能盡頁者以限於湯名藥名不可改易也二古歌四句僅載一方尚欠詳順本集歌不限方方不限句藥味藥引俱令周明病證治法略為兼括或一方而連匯多方方多而歌省並示古人用藥觸類旁通之妙間及加減之法便人取裁三醫學入門載歌三百首東垣歌二百六十八首皆不分門類每用一方搜尋殆遍本集歌止二百首而方三百有奇分為二十門某病某湯舉目易了方後稍為訓釋推明古人制方本義使用藥者有所依據服藥者得以參稽庶覺省便四歌后注釋所以暢歌詞之未備頗經錘鍊讀者倘不鄙夷亦可誦習也五拙著醫方集解網羅前賢方論卷帙稍繁不便攜帶故特束為歌訣附於本草之末使行旅可以輕齎緩急得以應用也六是書篇章雖約苟熟讀之可應無窮之變遠勝前人盈尺之書數部有識之士當不以愚言為狂僭也訒庵汪昂漫識補益之劑十首附方七四君子湯局方中和義參朮茯苓甘草比人參白朮茯苓各二錢甘草一錢氣味中和故名君子益以夏陳半夏陳皮名六君子湯祛痰補氣陽虛餌二陳除痰四君補氣脾弱陽虛宜之除卻半夏名異功散錢氏或加香砂胃寒使加木香砂仁行氣溫中名香砂六君子湯升陽益胃湯東垣參朮耆黃連半夏草陳皮苓瀉防風羌獨活柴胡白芍棗薑隨黃耆二兩人參半夏炙甘草各一錢羌活獨活防風白芍炒各五錢陳皮四錢白朮茯苓澤瀉柴胡各三錢黃連二錢每服三錢加薑棗煎六君子助陽補脾除痰重用黃耆補氣固胃柴胡羌獨除濕升陽澤瀉茯苓瀉熱降濁加芍藥和血斂陰少佐黃連以退陰火按東垣治療首重脾胃而益胃又以升陽為先故每用補中上升下滲之藥此方補中有散發中有收脾胃諸方多從此仿也黃耆鱉甲散羅謙甫地骨皮艽菀參苓柴半知地黃芍藥天冬桂甘桔桑皮勞熱宜治虛勞骨蒸晡熱咳嗽食少盜汗黃耆鱉甲天冬各五錢地骨秦艽茯苓柴胡各三錢紫菀半夏知母生地白芍桑皮炙草各二錢半人參肉桂桔梗各錢半每服一兩加薑煎鱉甲天冬知芍補水養陰參耆桂苓甘草固衛助陽桑桔瀉肺熱菀夏理痰嗽艽柴地骨退熱升陽為表裡氣血交補之劑秦艽鱉甲散羅謙甫治風勞地骨柴胡及青蒿當歸知母烏梅合止嗽除蒸斂汗高鱉甲地骨皮柴胡各一兩青蒿五錢秦艽當歸知母各五錢烏梅五錢治略同前汗多倍黃耆此方加青蒿烏梅皆斂汗退蒸之義秦艽扶羸湯湯直指鱉甲柴地骨當歸紫菀偕半夏人參兼炙草肺勞蒸嗽服之諧治肺痿骨蒸勞嗽聲嘎自汗體倦柴胡二錢秦艽鱉甲地骨當歸人參各錢半柴菀半夏甘草炙各一錢加薑棗煎按黃耆鱉甲散蓋本此方除當歸加余藥透肌解熱柴胡秦艽乾葛為要劑故骨蒸方中多用之此方雖表裡交治而以柴胡為君紫菀湯海藏中知母貝參苓五味阿膠偶再加甘桔治肺傷咳血吐痰勞熱久治肺傷氣極勞熱咳嗽吐痰吐血肺痿肺癰紫菀知母貝母阿膠各二錢人參茯苓甘草桔梗各五分五味十二粒一方加蓮肉以保肺止嗽為君故用阿膠五味以清火化痰為臣故用知母貝母佐以參苓甘草扶土以生金使以桔梗上浮而利膈氣極六極之一百合固金湯趙蕺庵二地黃玄參貝母桔甘藏麥冬芍藥當歸配喘咳痰血肺家傷生地二錢熟地三錢麥冬錢半貝母百合當歸白芍甘草各一錢玄參桔梗各八分火旺則金傷故以玄參二地助腎滋水麥冬百合保肺安神芍藥當歸平肝養血甘桔貝母清金化痰瀉以甘草培本不欲以苦寒傷生髮之氣也補肺阿膠散錢氏馬兜鈴鼠黏甘草杏糯停肺虛火盛人當服順氣生津嗽哽寧阿膠兩半馬兜鈴焙鼠黏子炒甘草炙糯米各一兩杏仁七錢牛蒡利膈滑痰杏仁降潤氣嗽李時珍曰馬兜鈴非取補肺取其清熱降氣肺自安也其中阿膠糯米乃補肺之正藥小建中湯仲景芍藥多即桂枝加芍藥湯再加飴糖名建中桂薑甘草大棗和更加飴糖補中臟虛勞腹冷服之瘥芍藥六兩桂枝生薑各三兩甘草一兩棗十二枚飴糖一升增入黃耆名亦爾再加黃耆兩半各黃耆建中湯金匱若除飴糖則名黃耆五物湯不名建中矣今人用建中者絶不用飴糖何哉表虛身痛效無過又有建中十四味陰斑勞損起沉疴亦有陰證發斑者淡紅隱隱散見肌表此寒伏於下逼其無根之火熏肺而然若服寒藥立斃十全大補加附子麥夏蓯蓉仔細哦即十全大補湯加附子麥冬半夏肉蓯蓉名十四味建中湯十四味除茯苓白朮麥冬川芎熟地肉蓯蓉名八味大建中湯治同益氣聰明湯東垣蔓荊升葛參耆黃柏並並加芍藥炙甘草耳聾目障服之清參耆各五錢蔓荊子葛根各三錢黃柏白芍各二錢升麻錢半炙草一錢每服四錢人之中氣不足清陽不升則耳目不聰明蔓荊升葛升其清氣參耆甘草補其中氣而以芍藥平肝木黃柏滋腎水也發表之劑十四首附方八麻黃湯仲景中用桂枝杏仁甘草四般施發熱惡寒頭項痛傷寒服此汗淋漓麻黃去節三兩桂枝二兩杏仁七十枚去皮尖甘草炙一兩傷寒太陽表證無汗用此發之麻黃善發汗恐其力猛故以桂枝監之甘草和之不令大發也按桂麻二湯雖治太陽證而先正每云皆肺藥以傷寒必自皮毛入而桂麻又入肺經也桂枝湯仲景治太陽中風芍藥甘草薑棗同桂枝芍藥生薑各三錢炙草三兩大棗干二枚治太陽中風有汗用此解肌以和營衛中猶傷也仲景傷寒論通用桂麻相合名各半湯太陽如瘧此為功熱多寒少如瘧狀者宜之大青龍湯仲景桂麻黃杏草石膏薑棗藏麻黃六兩桂枝炙草各三兩杏仁四十枚石膏雞子大生薑三兩大棗十二枚太陽無汗兼煩躁煩為陽為風躁為陰為寒必太陽證兼煩躁者方可用之以杏草佐麻黃髮表以薑棗佐桂枝解肌石膏質重瀉火氣輕亦達肌表義取青龍者龍興而云升雨降鬱熱賴除煩躁乃解也若少陰煩躁而誤服此則逆風寒兩解此為良麻黃湯治寒桂枝湯治風大青龍小風寒而兩解之陶節庵曰此湯險峻今人罕用小青龍湯仲景治水氣喘咳嘔噦渴利慰太陽表證未解心下有水氣者用之或喘或咳或嘔或噦或渴或利或短氣或小便祕皆水氣內積所致薑桂麻黃芍藥甘細辛半夏兼五味乾薑麻黃桂枝芍藥酒炒炙草細辛各二兩半夏五味子各半升桂枝解表使水從汗泄芍藥斂肺以收喘咳薑夏細辛潤腎行水止渴嘔亦表裡分消之意葛根湯仲景內麻黃襄二味加入桂枝湯桂枝芍藥炙草各二兩薑三兩棗十二枚此桂枝湯也加葛根四兩麻黃三兩輕可去實因無汗中風表實故汗不得出十劑曰輕可去實葛根麻黃之屬是也有汗加葛無麻黃名桂枝加葛根湯仲景治太陽有汗惡風升麻葛根湯錢氏錢乙再加芍藥甘草是升麻三錢葛根芍藥各二錢炙草一錢輕可去實辛能達表故用升藥發散陽明表邪陽邪盛則陰氣虛故加芍藥斂陰和血升麻甘草升陽解毒故亦治時疫陽明發熱與頭疼無汗惡寒均堪倚及目痛鼻乾不得臥等症亦治時疫與陽斑痘疹已出慎勿使恐升散重虛其表也九味羌活湯張元素用防風細辛蒼芷與川芎黃芩生地同甘草三陽解表益薑蔥羌活防風蒼朮各錢半白芷川芎生地甘草各一錢細辛五分加生薑蔥白煎陽虛氣弱人禁用加減臨時在變通潔古制此湯以代麻黃桂枝青龍各半等湯用羌防蒼細芎芷各走一經祛風散寒為諸路之應兵加黃芩泄氣中之熱生地泄血中之熱甘草以調和諸藥然黃芩生地寒滯未可概施用時宜審十神湯局方里葛升麻陳草芎蘇白芷加麻黃赤芍兼香附時行瘟疫感冒效堪誇葛根升麻陳皮甘草川芎白芷紫蘇麻黃赤芍香附等分加薑蔥煎治風寒兩感頭痛發熱無汗惡寒咳嗽鼻塞芎麻升葛蘇芷香附辛香利氣發表散寒加芍藥者斂陰氣於發汗之中加甘草者和陽氣於疏利之隊也吳綬曰此方用升麻葛根能解陽明瘟疫時氣若太陽傷寒發熱用之則引邪入陽明傳變發斑矣慎之神朮散局方用甘草蒼細辛藁本芎芷羌蒼朮二兩炙草細辛藁本白芷川芎羌活各一兩每服四錢生薑蔥白煎各走一經祛風濕太陰蒼朮少陰細辛厥陰少陽川芎太陽羌活藁本陽明白芷此方與九味羌活湯意同加藁本除黃芩生地防風較羌活湯更穩風寒泄瀉總堪嘗太無神術散太無丹溪之師即平胃散加入菖蒲與藿香陳皮為君二錢蒼朮厚朴各一錢炙草菖蒲藿各錢半治嵐瘴瘟瘧時氣海藏神術散蒼防草太陽無汗代麻黃蒼朮防風各二兩炙草一兩用代仲景麻黃湯治太陽傷寒無汗若以白朮易蒼朮太陽有汗此湯良名白朮湯用代桂枝湯治太陽傷風有汗二術主治略同特有止汗發汗之異麻黃附子細辛湯仲景發表溫經兩法彰麻黃藁細辛各二兩附子一枚炮麻黃髮太陽之汗附子溫少陰之經細辛為腎經表藥聯屬其間若非表裡相兼治少陰反熱曷能康少陰證脈沉屬裡當無熱今反發熱為太陰表證未除人參敗毒散活人毒即熱濕也茯苓草枳桔柴前羌獨芎薄荷少許薑三片時行感冒有奇功人參茯苓枳殼桔梗柴胡羌活獨活川芎各一兩甘草五錢每服二兩加薄荷生薑煎羌活理太陽遊風獨活理少陰伏風兼能去濕除痛川芎柴胡和血升清枳殼前胡行痰降氣甘桔參茯清肺強胃輔正匡邪也喻嘉言曰暑濕熱三氣門中推此方為第一俗醫減卻人參曾與他方有別耶去參名為敗毒散加入消風散見風門治亦同合消風散名消風敗毒散再造散節庵用參耆甘桂附羌防芎芍參細辛加棗煨薑煎陽虛無汗法當諳人參黃耆甘草川芎白芍酒炒羌活防風桂枝附子炮細辛煨薑大棗煎以參耆甘薑桂附大補其陽助羌防芎細散寒發表加芍藥者於陽中斂陰散中有收也陶節庵曰發熱頭痛惡寒無汗服汗劑汗不出者為陽虛不能作汗名無汗證庸醫不識不論時令遂以麻黃重劑劫取其汗誤人死者多矣又曰人第知參耆能止汗而不知其能發汗以在表藥隊中則助表藥而解散也麻黃人參芍藥湯東垣桂枝五味麥冬襄歸耆甘草汗兼補虛人外感服之康麻黃白芍黃耆當歸甘草炙各一錢人參麥冬各三分桂枝五分五味五粒東垣治一人內蘊虛熱外感大寒而吐血法仲景麻黃湯加補劑制此方一服而愈原解曰麻黃散外寒桂枝補表虛黃耆實表益衛人參益氣固表麥冬五味保肺氣甘草補脾芍藥安太陽當歸和血養血神白散衛生家寶用白芷甘薑蔥淡豉與相參白芷一兩甘草五錢淡豉五十粒薑三片蔥白三寸煎服取汗一切風寒皆可服疏表祛邪效可推必須得汗服乃有效肘後單煎蔥白豉蔥一握豉一升名蔥豉湯用代麻黃湯功不慚傷寒初覺頭痛身熱便宜服之可代麻黃湯攻裡之劑七首附方四大承氣湯仲景用芒硝枳實大黃厚朴饒大黃四兩酒洗芒硝三合厚朴八兩枳實五枚救陰瀉熱功偏擅急下陽明有數條大黃治大實芒硝治大燥大堅二味治無形血藥厚朴治大滿枳實治痞二味治有形氣藥熱毒傳入陽明胃府痞滿燥實堅全見雜證三焦實熱並須以此下之胃為水穀之海土為萬物之母四旁有病皆能傳入胃府則不復傳他經矣陶節庵曰傷寒熱邪傳裡須看熱氣淺深用藥大承氣最緊小承氣次之調胃又次之大柴胡又次之蓋恐硝性燥急故不輕用小承氣湯仲景朴實黃大黃四兩厚朴二兩薑炒枳實三枚麩炒譫狂痞硬上焦強熱在上焦則滿在中焦則硬胃有燥糞則譫語不用芒硝者恐傷下焦真陰也益以羌活名三化湯中風閉實可消詳用承氣治二便加羌活治風中風體實者可偶用然涉虛者多不可輕投調胃承氣湯仲景硝黃草大黃酒浸芒硝各一兩甘草炙五錢甘緩微和將胃保用甘草甘以緩之微和胃氣勿令大泄下不用朴實傷上焦不用厚朴枳實恐傷上焦氤氳之氣也中焦燥實服之好木香檳榔丸張子和青陳皮枳殼柏連稜術隨大黃黑醜兼香附芒硝水丸量服之一切實積能推蕩瀉痢食瘧用鹹宜木香檳榔青皮醋炒陳皮枳殼炒黃柏酒炒黃連吳茱萸炒三稜莪朮並醋煮各五錢大黃酒浸一兩香附牽牛各二兩芒硝水丸量虛實服木香香附青陳枳殼利氣寬腸黑牽牛檳榔下氣尤速氣行則無痞滿後重之患矣連柏燥實清熱稜莪行氣破血硝黃去血中伏熱併為推堅峻品濕熱積滯去則二便調而三焦通泰矣蓋宿垢不淨清陽終不得升亦通因通用之意也枳實導滯丸東垣首大黃芩連曲術茯苓襄澤瀉蒸餅糊丸服濕熱積滯力能攘大黃一兩枳實麩炒黃芩酒炒黃連酒炒神麯炒各五錢白朮土炒茯苓三錢澤瀉二錢蒸餅糊丸量虛實服之大黃枳實蕩熱去積芩連佐之以清熱苓瀉佐之以利濕神麯佐之以消食又恐苦寒力峻故加白朮補土固中若還後重兼氣滯木香導滯丸加檳榔溫脾湯千金參附與乾薑甘草當歸硝大黃寒熱並行治寒積臍腹絞結痛非常人參附子甘草芒硝各一兩大黃五兩當歸乾薑各三兩煎服日三本方除當歸芒硝亦名溫脾湯治久痢赤白脾胃冷實不消硝黃以蕩其積薑附以祛其寒參草當歸以保其血氣按古人方中多有硝黃柏連與薑茱桂附寒熱並用者亦有參朮硝黃補瀉並用者亦有大黃麻黃汗下兼行者令人罕識其旨姑録此方以見治療之妙不一端也蜜煎導法通大便仲景用蜜熬如飴捻作挺子摻皂角末乘熱納穀道中或摻鹽或將豬膽汁灌肛中用豬膽汁醋和以竹管插肛門中將汁灌入頃當大便名豬膽汁導法仲景不欲苦寒傷胃府陽明無熱勿輕攻胃府無熱而便祕者為汗多津液不足不宜用承氣妄攻此仲景心法後人罕識故録三方於攻下之末湧吐之劑二首附方六汗吐下和乃治療之四法經曰在上者湧之其高者因而越之故古人治病用吐法者最多朱丹溪曰吐中就有發散之義張子和曰諸汗法古方多有之惟以吐發汗者世罕知之今人醫療惟用汗下和而吐法絶置不用可見時師之缺略特補湧吐一門方藥雖簡而法不可廢也若丹溪用四物四君引吐又治小便不通亦用吐法是又在用者之圓神矣瓜蒂散仲景中赤小豆甜瓜蒂炒黃與赤小豆為末熱水或虀水調量虛實服之或入藜蘆鬱金湊張子和去赤豆加藜蘆防風一方去赤豆加鬱金韭汁俱名三聖散鵝翎探吐並治風痰此吐實熱與風痰瓜蒂吐實熱藜蘆吐風痰虛者參蘆散一味勾虛人痰壅不得服瓜蒂者以參蘆代之或加竹瀝若吐虛煩梔豉湯仲景梔子十四枚豉四合治傷寒後虛煩劇痰烏附尖方透丹溪治許白雲用瓜蒂梔子苦參藜蘆屢吐不透後以漿水和烏附尖服始得大吐古人尚有燒鹽方一切積滯功能奏燒鹽熱湯調服以指探吐治霍亂宿食冷痛等症千金曰凡病宜吐大勝用藥稀涎散嚴用和皂角白礬斑皂角四挺去皮弦炙白礬一兩為末每服五分白礬酸苦湧泄能軟頑痰皂角辛鹹通竅專制風木此專門之兵也初中風時宜用之或益藜蘆微吐間風中痰升人眩僕當先服此通其關令微吐稀涎續進他藥通關散用細辛皂角為末吹鼻得嚏保生還卒中者用此吹鼻有嚏者可治無嚏者為肺氣已絶和解之劑九首附方五小柴胡湯仲景和解供半夏人參甘草從更用黃芩加薑棗少陽百病此為宗柴胡八兩半夏半升人參甘草黃芩生薑各三兩大棗十二枚治一切往來寒熱胸滿脅痛心煩喜嘔口苦耳聾咳渴悸利半表半裡之證屬少陽經者但見一症即是不必悉具膽府清淨無出無入經在半表半裡法宜和解柴胡升陽達表黃芩退熱和陰半夏祛痰散逆參草輔正補中使邪不得復傳入里也四逆散仲景里用柴胡芍藥枳實甘草須柴胡芍藥炒枳實麩炒甘草炙等分此是陽邪成厥逆陽邪入里四肢逆而不溫斂陰泄熱平劑扶芍藥斂陰枳實泄熱甘草和逆柴胡散邪用平劑以和解之黃連湯仲景內用乾薑半夏人參甘草藏更用桂枝兼大棗寒熱平調嘔痛忘黃連炒乾薑炮甘草桂枝各三兩人參二兩半夏半升大棗十二枚治胸中有熱而欲嘔胃中有寒而作痛或丹田有熱胸中有寒者仲景亦用此湯按此湯與小柴胡湯同意以桂枝易柴胡黃連易黃芩以乾薑易生薑余藥同皆是和解之意但小柴胡湯屬少陽藥此湯屬太陽陽明藥也黃芩湯仲景用甘芍並二陽合利加棗烹治太陽少陽合病下利黃芩三兩芍藥甘草各二兩棗十二枚陽邪入里故以黃芩徹其熱甘草大棗和其太陰此方遂為治痢祖後人加味或更名利瀉泄也痢滯下也仲景本治傷寒下利機要用此治痢更名黃芩芍藥湯潔古治痢加木香檳榔大黃黃連當歸官桂名芍藥湯再加生薑與半夏名黃芩加生薑半夏湯仲景前症兼嘔此能平單用芍藥與甘草炙等分名芍藥甘草湯仲景散逆止痛能和營虞天民曰白芍不惟治血虛兼能行氣腹痛者營氣不和逆於內里以白芍行營氣以甘草和逆氣故治之也逍遙散局方用當歸芍柴芩術草加薑薄柴胡當歸酒拌白芍酒炒白朮土炒茯苓各一錢甘草炙五分加煨薑薄荷煎散郁除蒸功最奇肝虛則血病歸芍養血平肝木盛則土衰朮草和中補土柴胡升陽散熱茯苓利濕寧心生薑暖胃祛痰薄荷消風理血醫貫曰方中柴胡薄荷二味最妙蓋木喜風搖寒即摧萎溫即發生木鬱則火鬱火鬱則土鬱土鬱則金鬱金鬱則水鬱五行相因自然之理也余以一方治木鬱而諸郁皆解逍遙散是也調經八味丹梔著加丹皮梔子各八味逍遙散治肝傷血少藿香正氣散局方大腹蘇甘桔陳苓朮朴俱夏曲白芷加薑棗感傷外感內傷嵐瘴並能驅藿香大腹皮紫蘇茯苓白芷各三兩陳皮白朮土炒厚朴薑汁炒半夏曲桔梗各二兩甘草一兩每服五錢加薑棗煎藿香理氣和中辟惡止嘔蘇芷桔梗散寒利膈以散表邪腹朴硝滿陳夏除痰以疏里滯苓朮甘草益脾去濕以輔正氣正氣通暢則邪逆自除矣六和湯局方藿朴杏砂呈半夏木瓜赤茯苓術參扁豆同甘草薑棗煎之六氣平藿香厚朴砂仁半夏木瓜赤茯苓白朮人參扁豆甘草加薑棗煎能御風寒暑濕燥火六氣故名曰六和藿朴杏砂理氣化食參朮陳夏補正匡脾豆瓜祛暑赤茯行水大抵以理氣健脾為主脾胃既強則諸邪不能幹矣或益香藿或蘇葉傷寒傷暑用須明傷寒加蘇葉傷暑加香藿清脾飲嚴用和用青朴柴芩夏甘苓白朮偕更加草果薑煎服熱多陽瘧此方佳青皮厚朴醋炒柴胡黃芩半夏薑製甘草炙茯苓白朮土炒草果煨加薑煎瘧不止加酒炒常山一錢烏梅二個大渴加麥冬知母瘧疾一名脾寒蓋因脾胃受傷者居多此方乃加減小柴胡湯從溫脾諸方而一變也青柴平肝破滯朴夏平胃祛痰芩苓清熱利濕朮草補脾調中草果散太陰積寒除痰截瘧痛瀉要方劉草窗陳皮芍防風白朮煎丸酌白朮土炒三兩白芍酒炒四兩陳皮炒半兩防風一兩或煎或丸久瀉加升麻補土瀉木理肝脾陳皮理氣補脾防芍瀉木益土若作食傷醫便錯吳鶴皋曰傷食腹痛得瀉便減今瀉而痛不減故責之土敗木賊也表裡之劑八首附方五大柴胡湯仲景用大黃枳實苓夏白芍將煎加薑棗表兼里妙法內攻並外攘柴胡八兩大黃二兩枳實四枚半夏半升黃芩芍藥各三兩生薑五兩大棗十二枚治陽邪入里表證未除里證又急者柴胡解表大黃枳實攻裡黃芩清熱芍藥斂陰半夏和胃止嘔薑棗調和營衛按本方次方治少陽陽明後方治太陰陽明為不同柴胡加芒硝義亦爾小柴胡湯加芒硝六兩仲景仍有桂枝加大黃湯仲景桂枝湯內加大黃一兩芍藥三兩治太陽誤下轉屬太陰大實痛者防風通聖散河間大黃硝荊芥麻黃梔芍翹甘桔芎歸膏滑石薄荷芩術力偏饒表裡交攻陽熱盛外科瘍毒總能消大黃酒蒸芒硝防風荊芥麻黃黑梔白芍炒連翹川芎當歸薄荷白朮各五錢桔梗黃芩石膏各一兩甘草二兩滑石三兩加薑蔥煎荊防麻黃薄荷發汗而散熱搜風梔子滑石硝黃利便而降火行水芩桔石膏清肺瀉胃川芎歸芍養血補肝連翹散氣聚血凝甘術能補中燥濕故能汗不傷表下不傷里也五積散局方治五般積寒積食積氣積血積痰積麻黃蒼芷芍歸芎枳桔桂薑甘茯朴陳皮半夏加薑蔥當歸川芎白芍茯苓桔梗各八分蒼朮白芷厚朴陳皮各六分枳殼七分麻黃半夏各四分肉桂乾薑甘草各三分重表者用桂枝桂麻解表散寒甘芍和里止痛蒼朴平胃陳夏行痰芎歸養血茯苓利水薑芷祛寒濕枳桔利膈腸一方統治多病唯善用者變而通之除桂枳陳余略炒三味生用余藥微炒名熟料五積散熟料尤增溫散功溫中解表祛寒濕散痞調經用各充陶節庵曰凡陰證傷寒脈浮沉無力均當服之亦可加附子三黃石膏湯芩柏連梔子麻黃豆豉全薑棗細茶兼熱服寒因熱用表裡三焦熱盛宣石膏兩半黃芩黃連黃柏各七錢梔子三十個麻黃淡豉各二合每服一兩薑三片棗二枚茶一撮煎熱服治表裡三焦大熱譫狂斑衄身目俱黃黃芩瀉上焦黃連瀉中焦黃柏瀉下焦梔子通瀉三焦之火以清裡麻黃淡豉散寒發汗而解表石膏體重能瀉肺胃之火氣輕亦能解肌也葛根黃芩黃連湯仲景甘草四般治二陽治太陽桂枝證醫誤下之邪入陽明協熱下利脈促喘而汗出者葛根八兩炙草黃芩各二兩黃連三兩解表清裡兼和胃喘汗自利保平康成無己曰邪在裡宜見陰脈促為陽盛知表未解也病有汗出而喘者為邪氣外甚今喘而汗出為裡熱氣逆與此方散表邪清裡熱脈數而止曰促用葛根者專主陽明之表參蘇飲元戎內用陳皮枳殼前胡半夏宜乾葛木香甘桔茯內傷外感此方推人參紫蘇前胡半夏薑製乾葛茯苓各七錢半陳皮枳殼麩炒桔梗木香甘草各二錢每服二錢加薑棗煎治外感內傷發熱頭痛嘔逆咳嗽痰眩風瀉外感重者去棗加蔥白蘇葛前胡解表參芩甘草補中陳皮木香行氣破滯半夏枳桔利膈祛痰參前若去芎柴入飲號芎蘇治不瘥去人參前胡加川芎柴胡名芎蘇飲不服參者宜之香蘇飲局方僅陳皮草感傷內外亦堪施香附炒紫蘇各二錢陳皮去白一錢甘草七分加薑蔥煎茵陳丸外臺用大黃硝鱉甲常山巴豆邀杏仁梔豉蜜丸服汗吐下兼三法超時氣毒癘及瘧痢一丸兩服量病調茵陳芒硝鱉甲炙梔子各二兩大黃五兩常山杏仁炒各三兩巴豆一兩去心皮炒豉五合蜜丸梧子大每服一丸或吐或利不應再服一丸不應以熱湯投之梔子淡豉梔豉湯也合常山可以湧吐合杏仁可以解肌大黃芒硝承氣湯也可以蕩熱去實合茵陳可以利濕退黃加巴豆大熱以祛臟腑積寒加鱉甲滋陰以退血分寒熱此方備汗吐下三法雖云劫劑實是佳方大羌活湯即九味己獨知連白朮暨即九味羌活湯加防己知母獨活黃連生地川芎知母各一兩余藥各三錢每服五錢散熱培陰表裡和傷寒兩感瘥堪慰兩感傷寒一曰太陽與少陰俱病二曰陽明與太陰俱病三曰少陽與厥陰俱病陰陽表裡同時俱病欲汗則有里證欲下則有表證經曰其兩感於寒者必死仲景無治法潔古為制此方間有生者羌獨蒼防細辛以散寒發表芩連防己知母芎地以清裡培陰白朮甘草以固中和表裡消補之劑七首附方六平胃散局方是蒼朮朴陳皮甘草四般藥蒼朮泔浸二錢厚朴薑汁炒陳皮去白甘草炙各一錢薑棗煎除濕散滿驅瘴嵐調胃諸方從此擴蒼朮燥濕強脾厚朴散滿平胃陳皮利氣行痰甘草和中補土泄中有補也或合二陳名平陳湯治痰或五苓名胃苓湯治泄硝黃麥曲均堪著加麥芽神麯消食加大黃芒硝蕩積若合小柴胡名柴平湯煎加薑棗能除瘧又不換金正氣散即是此方加夏藿半夏藿香保和丸神麯與山楂苓夏陳翹蔔音卜子加曲糊為丸麥芽湯下亦可方中用麥芽山楂去核三兩神麯茯苓半夏各一兩蔔子微炒連翹各五錢山楂消肉食麥芽消穀食神麯消食解酒蔔子下氣制曲茯苓滲濕連翹散結陳夏健脾化痰此內傷而氣末病者故但以和平之品消而化之不必攻補也太安丸內加白朮二兩中消兼補效堪誇健脾丸參朮與陳皮枳實山楂麥蘖芽隨曲糊作丸米飲下消補兼行胃弱宜人參白朮土炒各二兩陳皮麥芽炒各一兩山楂兩半枳實麩炒三兩陳皮枳實理氣化積山楂消肉食曲麥消穀食人參白朮益氣強脾枳朮丸潔古亦消兼補白朮土炒枳實麩炒等分荷葉燒飯上升奇荷葉包陳米飯煨乾為丸引胃氣及少陽甲膽之氣上升參苓白朮散扁豆陳山藥甘蓮砂薏仁數藥利氣強脾桔梗上浮載藥上行兼保肺恐燥藥上僭棗湯調服益脾神人參茯苓白朮土炒陳皮山藥甘草炙各一斤扁豆炒十二兩蓮肉炒砂仁苡仁炒桔梗各半斤共為末每服二錢棗湯或米飲調下枳實消痞丸東垣四君全麥芽夏曲朴薑連蒸餅糊丸消積滿清熱破結補虛痊枳實麩炒黃連薑汁炒各五錢人參白朮土炒半夏曲厚朴薑汁炒茯苓各三錢甘草炙乾薑各二錢黃連枳實治痞君藥麥夏薑朴溫胃散滿參朮苓甘燥濕補脾使氣足脾運痞乃化也鱉甲飲子嚴氏治瘧母久瘧不愈中有結癖甘草耆朮芍芎偶草果檳榔厚朴增烏梅薑棗同煎服鱉甲醋炙黃耆白朮土炒甘草陳皮川芎白芍酒炒草果麵煨檳榔厚朴等分薑三片棗二枚烏梅少許煎鱉甲屬陰入肺退熱散結為君甘陳耆術助陽補氣川芎白芍養血和陰草果溫胃檳榔破積厚朴散滿甘草和中烏梅酸斂薑棗和營衛葛花解酲湯香砂仁二苓參朮蔻青陳神麯乾薑兼澤瀉溫中利濕酒傷珍葛花砂仁豆蔻各一錢木香一分茯苓人參白朮炒青皮陳皮各四分神麯炒乾薑豬苓澤瀉各五分專治酒積及吐瀉痞塞砂蔻神麯皆能解酒青皮木香乾薑行氣溫中葛花引濕熱從肌肉出苓瀉引濕熱從小便出益以參術固其中氣也理氣之劑十一首附方八補中益氣湯東垣耆朮陳升柴參草當歸身黃耆蜜炙錢半人參甘草炙各一錢白朮土炒陳皮留白歸身各五分升麻柴胡各三分加薑棗煎表虛者升麻用蜜水炒用東垣曰升柴味薄性陽能引脾胃清氣行於陰道以資春氣之和又引參耆甘草上行充實腠理使衛外為固凡補脾胃之氣多以升陽補氣名之者此也虛勞內傷功獨擅亦治陽虛外感因虛人感冒不在發散者此方可以代之或加辛散藥木香蒼朮易歸術調中益氣暢脾神除當歸白朮加木香蒼朮名調中益氣湯前方加白芍五味子發中有收亦名調中益氣湯俱李東垣方烏藥順氣湯嚴用和芎芷薑橘紅枳桔及麻黃殭蠶炙草薑煎服中氣厥逆此方詳厥逆痰塞口噤脈伏身溫為中風身冷為中氣中風多痰涎中氣無痰涎以此為辨許學士云中氣之證不可作中風治喻嘉言曰中風證多挾中氣烏藥橘紅各二錢川芎白芷枳殼桔梗麻黃各一錢殭蠶去絲嘴炒炮薑炙草各五分加薑棗煎麻梗芎芷發汗散寒以順表氣烏薑陳枳行氣祛痰以順裡氣加殭蠶清化消風甘草協和諸藥古云氣順則風散風邪卒中當先治標也越鞠丸丹溪治六般郁氣血痰火濕食因此六郁也芎蒼香附兼梔曲氣暢郁舒痛悶伸吳鶴皋曰香附開氣鬱蒼朮燥濕鬱撫芎調血鬱梔子清火鬱神麯消食鬱各等分麵糊為丸又濕鬱加茯苓白芷火鬱加青黛痰鬱加半夏栝蔞海石血鬱加桃仁紅花氣鬱加木香檳榔食鬱加麥芽山楂挾寒加吳茱萸又六郁湯蒼芎附甘苓橘半梔砂仁蒼朮川芎香附甘草茯苓橘紅半夏梔子砂仁此前方加味兼治痰鬱看六郁中之重者為君余藥聽加減用之蘇子降氣湯局方橘半歸前胡桂朴草薑依下虛上盛痰嗽喘亦有加參貴合機蘇子橘紅半夏當歸前胡厚朴薑汁炒各一錢肉桂炙甘草各五分加薑煎一方無桂加沉香蘇子前胡橘紅半夏降氣行痰氣行則痰行也數藥兼能發表加當歸和血甘草緩中下虛上盛故用官桂引火歸元如氣虛亦有加人參五味者四七湯三因理七情氣七氣寒熱喜怒憂愁恚也亦名七氣湯半夏厚朴茯苓蘇半夏薑汁炒五錢厚朴薑汁炒三錢茯苓四錢紫蘇二錢郁雖由乎氣亦多挾濕挾痰故以半夏厚朴除痰散滿茯苓蘇葉利濕寬中濕去痰行郁自除矣薑棗煎之舒鬱結痰涎嘔痛盡能紓又有局方名四七湯參桂夏草妙更殊人參官桂半夏各一錢甘草五分加薑煎人參補氣官桂平肝薑製半夏祛痰甘草和中並不用利氣之藥湯名四七者以四味治人之七情也四磨湯嚴氏亦治七情侵人參烏藥及檳沉人參烏藥檳榔沉香等分氣逆故以烏藥